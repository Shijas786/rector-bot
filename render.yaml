services:
  # Agent Worker
  - type: worker
    name: openclaw-predictor-agent
    runtime: node
    plan: starter
    buildCommand: cd agent && npm install && npx prisma generate
    startCommand: cd agent && npm start
    envVars:
      - key: PRIVATE_KEY
        sync: false
      - key: OPENCLAW_TELEGRAM_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PREDICTION_REGISTRY_ADDRESS
        sync: false
      - key: BINANCE_API_URL
        value: https://api.binance.com
      - key: BINANCE_WS_URL
        value: wss://stream.binance.com:9443
      - key: DATABASE_URL
        fromDatabase:
          name: openclaw-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: openclaw-redis
          property: connectionString
      - key: GREENFIELD_RUNBOOKS_BUCKET
        value: predict-runbooks
      - key: GREENFIELD_EVIDENCE_BUCKET
        value: predict-evidence

databases:
  - name: openclaw-db
    plan: free
    databaseName: openclaw_predictor

services_extra:
  - type: redis
    name: openclaw-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
