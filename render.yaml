services:
  # Agent Worker
  - type: worker
    name: openclaw-predictor-agent
    runtime: node
    plan: starter
    buildCommand: cd agent && rm -rf node_modules && npm install && npx prisma generate && npm run build
    startCommand: cd agent && npm start
    envVars:
      - key: PRIVATE_KEY
        sync: false
      - key: OPENCLAW_TELEGRAM_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PREDICTION_REGISTRY_ADDRESS
        sync: false
      - key: BINANCE_API_URL
        value: https://api.binance.com
      - key: BINANCE_WS_URL
        value: wss://stream.binance.com:9443
      - key: DATABASE_URL
        fromDatabase:
          name: openclaw-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: openclaw-redis
          property: connectionString
      - key: GREENFIELD_RUNBOOKS_BUCKET
        value: predict-runbooks
      - key: GREENFIELD_EVIDENCE_BUCKET
        value: predict-evidence

  # Next.js Frontend
  - type: web
    name: openclaw-predictor-frontend
    runtime: node
    plan: starter
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_REGISTRY_ADDRESS
        sync: false
      - key: NEXT_PUBLIC_BSC_RPC
        value: https://data-seed-prebsc-1-s1.binance.org:8545/
      - key: NEXT_PUBLIC_BSCSCAN_URL
        value: https://testnet.bscscan.com

databases:
  - name: openclaw-db
    plan: free
    databaseName: openclaw_predictor

services_extra:
  - type: redis
    name: openclaw-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
